{# templates/components/cloud_upload.html #}
<div class="cloud-upload-section mt-4">
    <div class="text-center">
        <p class="text-muted mb-3">{{ _('Ou importez depuis le cloud') }} :</p>
        <div class="d-flex justify-content-center gap-3 flex-wrap">
            <!-- Google Drive -->
            <button type="button" class="btn btn-outline-danger" onclick="cloudUpload.open('google')">
                <i class="fab fa-google-drive me-2"></i>Google Drive
            </button>
            
            <!-- OneDrive -->
            <button type="button" class="btn btn-outline-primary" onclick="cloudUpload.open('onedrive')">
                <i class="fab fa-microsoft me-2"></i>OneDrive
            </button>
            
            <!-- Dropbox -->
            <button type="button" class="btn btn-outline-info" onclick="cloudUpload.open('dropbox')">
                <i class="fab fa-dropbox me-2"></i>Dropbox
            </button>
            
            <!-- iCloud -->
            <button type="button" class="btn btn-outline-secondary" onclick="cloudUpload.open('icloud')">
                <i class="fab fa-apple me-2"></i>iCloud
            </button>
        </div>
    </div>
</div>

<!-- Modal pour la sélection des fichiers -->
<div class="modal fade" id="cloudFileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-cloud-upload-alt me-2"></i>
                    {{ _('Importer depuis le cloud') }}
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="cloudFileBrowser">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div id="cloudPath" class="text-muted small">
                            <i class="fas fa-folder-open me-1"></i>
                            <span>/</span>
                        </div>
                        <button class="btn btn-sm btn-outline-secondary" onclick="cloudUpload.goBack()" style="display: none;" id="cloudBackBtn">
                            <i class="fas fa-arrow-left me-1"></i>{{ _('Retour') }}
                        </button>
                    </div>
                    <div id="cloudFileList" class="list-group">
                        <div class="text-center p-4">
                            <i class="fas fa-spinner fa-spin me-2"></i>
                            {{ _('Chargement...') }}
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    {{ _('Annuler') }}
                </button>
                <button type="button" class="btn btn-primary" id="cloudSelectBtn" disabled onclick="cloudUpload.selectFile()">
                    <i class="fas fa-check me-1"></i>{{ _('Sélectionner') }}
                </button>
            </div>
        </div>
    </div>
</div>
